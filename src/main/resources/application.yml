spring:

  datasource:
    url: jdbc:postgresql://localhost:5432/smartjobtracker
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true


server:
  port: 8080


jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}