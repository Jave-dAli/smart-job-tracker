version: '3.8'

services:

  postgres:

    image: postgres:15

    container_name: jobtracker-db

    restart: always

    environment:
      POSTGRES_DB: smartjobtracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: